<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAC Cred | Simulação</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
	body{
		font-family:'Inter',sans-serif;
		background:#f2f2f2;
	}
	.maquininha-container{
		position:relative;
		max-width:340px;
		margin:auto;
	}

	.maquininha{
		width:95%;
	}

	.tela-maquininha{
		position:absolute;
		top:112px;
		left:25px;
		width:260px;
		background:#000;
		padding:15px;
		border-radius:10px;
		color:white;
	}

	.tela-maquininha label{
		font-size:12px;
	}

	.tela-maquininha input,
	.tela-maquininha select{
		font-size:13px;
	}
	.result-card h1{
		font-size:clamp(26px,4vw,48px);
		font-weight:800;
	}
	.result-card span{
		color:#1db954;
		font-weight:600;
	}
	.flags img{
		height:30px;
		margin:0 10px;
	}
</style>

</head>
<body>
	<div class="container-fluid py-4">
		<div class="row g-4">
			<!-- LADO ESQUERDO -->
			<div class="col-12 col-lg-3">
			    <div class="maquininha-container">
        			<img src="maquininha.png" class="img-fluid maquininha">
			        <div class="tela-maquininha">
						<h4 class="fw-bold mb-1 text-center">Simulação</h4>
						<div class="mb-3">
							<label class="form-label">Opção</label>
							<div class="btn-group w-100">
								<input type="radio" class="btn-check" name="modo" id="receber" value="receber">
								<label class="btn btn-outline-light" for="receber">Quero Receber</label>
								
								<input type="radio" class="btn-check" name="modo" id="cobrar" value="cobrar" checked>
								<label class="btn btn-outline-light" for="cobrar">Quero Cobrar</label>
							</div>
						</div>

						<div class="mb-3">
							<label>Valor</label>
							<input type="number" id="valor" class="form-control" value="500">
						</div>

						<div class="mb-3">
							<label>Cartão</label>
							<select id="cartao" class="form-select">
								<option value="">Selecione</option>
							</select>
						</div>

						<div class="mb-3">
							<label>Parcelas</label>
							<select id="parcelas" class="form-select">
							<option value="">Selecione</option></select>
						</div>

						<button class="btn btn-success w-100" id="btnSimular">Calcular</button>
					</div>
				</div>
			</div>

			<!-- LADO DIREITO -->
			<div class="col-12 col-lg-9">
				<div class="row g-4 mb-3">
					<div class="col-12 text-center">
						<img src="logomarca.png" style="height: 10vh" alt="CAC Cred" />
					</div>
				</div>
				<div class="row g-4">
					<div class="col-md-6">
						<div class="card result-card shadow p-4 text-center">
							<h1 id="valorInvestido">R$ 0,00</h1>
							<span>Valor Investido</span>
						</div>
					</div>

					<div class="col-md-6">
						<div class="card result-card shadow p-4 text-center">
							<h1 id="valorPagar">R$ 0,00</h1>
							<span>Investimento a Pagar</span>
						</div>
					</div>

					<div class="col-md-6">
						<div class="card result-card shadow p-4 text-center">
							<h1 id="qtdParcelas">0</h1>
							<span>Quantidade de Parcelas</span>
						</div>
					</div>

					<div class="col-md-6">
						<div class="card result-card shadow p-4 text-center">
							<h1 id="valorParcela">R$ 0,00</h1>
							<span>Valor da Parcela</span>
						</div>
					</div>

					<div class="col-12">
						<div class="card shadow p-4 text-center">
							<div class="row">
								<div class="col-6">
									<strong id="taxaTotal">0%</strong>
									<p class="text-success mb-0">Taxa Total</p>
								</div>
								<div class="col-6">
									<strong id="valorJuros">R$ 0,00</strong>
									<p class="text-success mb-0">Valor de Juros</p>
								</div>
							</div>
						</div>
					</div>

					<div class="col-12 text-center flags mt-3">
						<img src="visa.png">
						<img src="master.png">
						<img src="elo.png">
						<img src="banesecard.png">
						<img src="diners.png">
					</div>

				</div>
			</div>
		</div>
	</div>

	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="script.js"></script>
</body>
</html>
